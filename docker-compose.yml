services:
  postgres:
    image: postgres:16-alpine
    container_name: ebay-volume-tool-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ebay_tool
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ebay_tool']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: ebay-volume-tool-postgres-data
